/* ─── Tiny Supabase client (no npm needed in artifact) ─── */
const sb = {
  async get(table, opts = {}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=*`;
    if (opts.order) url += `&order=${opts.order}`;
    const r = await fetch(url, { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async getSingle(table, key) {
    const url = `${SUPABASE_URL}/rest/v1/${table}?key=eq.${key}&select=*`;
    const r = await fetch(url, { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } });
    if (!r.ok) throw new Error(await r.text());
    const rows = await r.json();
    return rows[0] || null;
  },
  async upsert(table, data) {
    const url = `${SUPABASE_URL}/rest/v1/${table}`;
    const r = await fetch(url, {
      method: "POST",
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, "Content-Type": "application/json", Prefer: "resolution=merge-duplicates,return=representation" },
      body: JSON.stringify(Array.isArray(data) ? data : [data]),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async update(table, match, data) {
    const [col, val] = Object.entries(match)[0];
    const url = `${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}`;
    const r = await fetch(url, {
      method: "PATCH",
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(data),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async updateSetting(key, value) {
    const url = `${SUPABASE_URL}/rest/v1/site_settings?key=eq.${key}`;
    const r = await fetch(url, {
      method: "PATCH",
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify({ value, updated_at: new Date().toISOString() }),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async deletRow(table, match) {
    const [col, val] = Object.entries(match)[0];
    const url = `${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}`;
    const r = await fetch(url, {
      method: "DELETE",
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` },
    });
    if (!r.ok) throw new Error(await r.text());
  },
};

/* ─── DESIGN TOKENS ─── */
const C = {
  violet:"#5B21B6", blue:"#1D4ED8", teal:"#0891B2", rose:"#DC2626",
  green:"#059669", amber:"#D97706", ink:"#111827", body:"#374151",

const Fs="'Inter',system-ui,sans-serif"; const Fd="'Plus Jakarta Sans',system-ui,sans-serif";

/* ─── RESPONSIVE HOOK ─── */
function useW(){ const [w,setW]=useState(typeof window!=="undefined"?window.innerWidth:1200); useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);return w; }

/* ─── ORBIT LOGO ─── */
function OrbitIcon({size=36}){
  return(
    <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
      <defs><linearGradient id="admlg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse"><stop offset="0%" stopColor="#0891B2"/><stop offset="100%" stopColor="#1D4ED8"/></linearGradient></defs>
      <rect width="44" height="44" rx="11" fill="url(#admlg)"/>
      <ellipse cx="22" cy="22" rx="14" ry="6.5" stroke="white" strokeWidth="1.8" strokeOpacity=".55" fill="none" transform="rotate(-38 22 22)"/>
      <ellipse cx="22" cy="22" rx="14" ry="6.5" stroke="white" strokeWidth="1.8" strokeOpacity=".28" fill="none" transform="rotate(28 22 22)"/>
      <circle cx="22" cy="22" r="5.5" fill="white"/>
      <circle cx="34" cy="15" r="2.8" fill="white"/>
      <circle cx="10" cy="30" r="1.8" fill="white" fillOpacity=".65"/>
    </svg>
  );
}

/* ─── SHARED UI ─── */
function Field({label,value,onChange,type="text",help,rows=3,multi=false,placeholder=""}){
  const base={width:"100%",padding:"10px 13px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:Fs,outline:"none",color:C.ink,boxSizing:"border-box",transition:"border-color .15s",background:C.white};
  return(
    <div style={{marginBottom:14}}>
      {label&&<label style={{fontSize:12,fontWeight:600,color:C.body,display:"block",marginBottom:5}}>{label}</label>}
      {multi
        ?<textarea value={value} onChange={e=>onChange(e.target.value)} rows={rows} placeholder={placeholder} style={{...base,resize:"vertical"}} onFocus={e=>e.target.style.borderColor=C.violet} onBlur={e=>e.target.style.borderColor=C.border}/>
        :<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={base} onFocus={e=>e.target.style.borderColor=C.violet} onBlur={e=>e.target.style.borderColor=C.border}/>
      }
      {help&&<div style={{fontSize:11.5,color:C.muted,marginTop:4}}>{help}</div>}
    </div>
  );
}

function Btn({onClick,children,variant="primary",size="md",full=false,disabled=false}){
  const bg={primary:C.violet,success:"#ECFDF5",danger:"#FEF2F2",ghost:C.pale,outline:C.white}[variant];
  const col={primary:"white",success:C.green,danger:C.rose,ghost:C.body,outline:C.violet}[variant];
  const bd={outline:`1.5px solid ${C.violet}`,ghost:`1px solid ${C.border}`}[variant]||"none";
  const pd=size==="sm"?"6px 14px":size==="lg"?"14px 32px":"10px 22px";
  return(
    <button onClick={onClick} disabled={disabled} style={{padding:pd,background:bg,color:col,border:bd,borderRadius:8,fontWeight:700,fontSize:size==="sm"?12:14,cursor:disabled?"not-allowed":"pointer",fontFamily:Fs,transition:"all .18s",width:full?"100%":"auto",opacity:disabled?.6:1,display:"inline-flex",alignItems:"center",gap:6,justifyContent:"center"}}
      onMouseEnter={e=>{if(!disabled&&variant==="primary")e.currentTarget.style.background="#4C1D95";}}
      onMouseLeave={e=>{if(!disabled&&variant==="primary")e.currentTarget.style.background=C.violet;}}>
      {children}
    </button>
  );
}

function Card({children,style={}}){ return <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:14,padding:20,boxShadow:"0 1px 8px rgba(0,0,0,.04)",marginBottom:16,...style}}>{children}</div>; }

function SectionHead({icon,title,children}){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:9}}>
        <span style={{fontSize:22}}>{icon}</span>
        <span style={{fontFamily:Fd,fontWeight:800,fontSize:18,color:C.ink,letterSpacing:"-.4px"}}>{title}</span>
      </div>
      {children}
    </div>
  );
}

function Tag({col,children}){ return <span style={{fontSize:10,fontWeight:700,background:`${col}14`,color:col,padding:"2px 8px",borderRadius:100,letterSpacing:.3}}>{children}</span>; }

function Alert({type="info",children}){
  const styles={info:{bg:"#EFF6FF",border:"#BFDBFE",col:"#1E40AF"},warn:{bg:"#FFFBEB",border:"#FDE68A",col:"#92400E"},success:{bg:"#ECFDF5",border:"#A7F3D0",col:"#065F46"}};
  const s=styles[type];
  return <div style={{background:s.bg,border:`1px solid ${s.border}`,borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:13.5,color:s.col,lineHeight:1.65}}>{children}</div>;
}

function Spinner(){ return <div style={{width:18,height:18,border:`2px solid ${C.border}`,borderTop:`2px solid ${C.violet}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}><style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style></div>; }

function Toast({msg,type="success",onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t);},[]);
  const col=type==="error"?C.rose:C.green;
  return(
    <div style={{position:"fixed",bottom:20,right:20,background:C.white,border:`1.5px solid ${col}`,color:col,borderRadius:12,padding:"13px 18px",fontWeight:600,fontSize:14,boxShadow:"0 8px 32px rgba(0,0,0,.12)",zIndex:9999,display:"flex",alignItems:"center",gap:9,fontFamily:Fs,maxWidth:320}}>
      <span style={{fontSize:18}}>{type==="error"?"❌":"✅"}</span>{msg}
    </div>
  );
}

function ytId(url){ if(!url)return null; const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?\s]+)/); return m?m[1]:null; }

}

/* ─── HERO ─── */
function HeroSection({onToast}){

  const [d,setD]=useState({headline_1:"AI-powered software",headline_2:"for every business,",headline_3:"everywhere.",subtext:"",cta_primary:"Start Free Trial",cta_secondary:"See all products",badge:""});
  const [loading,setLoading]=useState(true); const [saving,setSaving]=useState(false);
  useEffect(()=>{ sb.getSingle("site_settings","hero").then(r=>{ if(r?.value)setD(r.value); }).catch(()=>{}).finally(()=>setLoading(false)); },[]);
  const save=async()=>{ setSaving(true); try{ await sb.updateSetting("hero",d); onToast("Hero section saved — live on your website!"); }catch(e){ onToast("Error: "+e.message,"error"); } setSaving(false); };

        <Field label="Top Badge Text" value={d.badge} onChange={v=>setD({...d,badge:v})} help="The pill badge at the very top of the hero"/>
      </Card>
    </div>
  );
}

/* ─── PRODUCTS ─── */
function ProductsSection({onToast}){
  const w=useW(); const mob=w<640;
  const [prods,setProds]=useState([]); const [loading,setLoading]=useState(true); const [open,setOpen]=useState(null); const [saving,setSaving]=useState(null);
  useEffect(()=>{ sb.get("products",{order:"sort_order"}).then(setProds).catch(()=>{}).finally(()=>setLoading(false)); },[]);
  const upd=(id,f,v)=>setProds(ps=>ps.map(p=>p.id===id?{...p,[f]:v}:p));
  const save=async(p)=>{ setSaving(p.id); try{ await sb.update("products",{id:p.id},{name:p.name,icon:p.icon,tagline:p.tagline,description:p.description,color:p.color,video_url:p.video_url,active:p.active,updated_at:new Date().toISOString()}); onToast(`${p.name} saved — live on website!`); }catch(e){ onToast("Error: "+e.message,"error"); } setSaving(null); };
  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner/></div>;
  return(
    <div>
      <SectionHead icon="📦" title="Products"/>
      <Alert type="info">💡 <strong>New product?</strong> Ask Claude for a new HTML page → upload to GitHub → it deploys automatically.</Alert>
      {prods.map(p=>(
        <Card key={p.id} style={{padding:0,overflow:"hidden"}}>
          <div onClick={()=>setOpen(open===p.id?null:p.id)} style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:12,background:open===p.id?`${p.color}06`:C.pale,cursor:"pointer",flexWrap:"wrap"}}>
            <span style={{fontSize:22}}>{p.icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:Fd,fontWeight:700,fontSize:14.5,color:C.ink,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                {p.name}{p.video_url&&<Tag col={C.green}>▶ Video</Tag>}{!p.active&&<Tag col={C.muted}>Hidden</Tag>}
              </div>
              <div style={{fontSize:12,color:C.muted,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.tagline}</div>
            </div>
            <span style={{fontSize:11,color:C.muted,flexShrink:0}}>{open===p.id?"▲ Close":"▼ Edit"}</span>
          </div>
          {open===p.id&&(

/* ─── TESTIMONIALS ─── */
function TestimonialsSection({onToast}){
  const w=useW(); const mob=w<640;
  const [list,setList]=useState([]); const [loading,setLoading]=useState(true); const [saving,setSaving]=useState(false);
  useEffect(()=>{ sb.get("testimonials",{order:"sort_order"}).then(setList).catch(()=>{}).finally(()=>setLoading(false)); },[]);
  const upd=(i,f,v)=>setList(ls=>ls.map((t,j)=>j===i?{...t,[f]:v}:t));
  const add=()=>setList(ls=>[...ls,{id:Date.now(),quote:"",name:"",role:"",initials:"",product:"",color:C.blue,sort_order:ls.length+1}]);
  const rem=async(t,i)=>{
    if(t.id&&typeof t.id==="number"&&t.id>9999){ setList(ls=>ls.filter((_,j)=>j!==i)); return; }
    try{ await sb.deletRow("testimonials",{id:t.id}); setList(ls=>ls.filter((_,j)=>j!==i)); onToast("Testimonial removed."); }catch(e){ onToast("Error: "+e.message,"error"); }
  };
  const save=async()=>{
    setSaving(true);
    try{
      for(const t of list){
        if(typeof t.id==="number"&&t.id>9999){
          await sb.upsert("testimonials",[{quote:t.quote,name:t.name,role:t.role,initials:t.initials,product:t.product,color:t.color,sort_order:t.sort_order}]);
        } else {
          await sb.update("testimonials",{id:t.id},{quote:t.quote,name:t.name,role:t.role,initials:t.initials,product:t.product,color:t.color,updated_at:new Date().toISOString()});
        }
      }
      const fresh=await sb.get("testimonials",{order:"sort_order"}); setList(fresh);
      onToast("Testimonials saved — live on website!");
    }catch(e){ onToast("Error: "+e.message,"error"); }
    setSaving(false);
  };
  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner/></div>;
  return(
    <div>
      <SectionHead icon="⭐" title="Testimonials"><Btn onClick={save} disabled={saving}>{saving?"Saving…":"Save All & Go Live"}</Btn></SectionHead>
      {list.map((t,i)=>(
        <Card key={t.id||i}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <span style={{fontFamily:Fd,fontWeight:700,fontSize:14,color:C.ink}}>Review {i+1}</span>
            <Btn onClick={()=>rem(t,i)} variant="danger" size="sm">Remove</Btn>
          </div>
          <Field label="Quote" value={t.quote} onChange={v=>upd(i,"quote",v)} multi rows={3} placeholder="What did this customer say?"/>
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr 1fr",gap:12}}>
            <Field label="Customer Name" value={t.name} onChange={v=>upd(i,"name",v)} placeholder="Rajan Kumar"/>
            <Field label="Role / Business" value={t.role} onChange={v=>upd(i,"role",v)} placeholder="SpiceGarden, Chennai"/>
            <Field label="Initials" value={t.initials} onChange={v=>upd(i,"initials",v)} help="2 letters for avatar" placeholder="RK"/>
          </div>
          <Field label="Product Used" value={t.product} onChange={v=>upd(i,"product",v)} placeholder="NexusPOS"/>
        </Card>
      ))}
      <button onClick={add} style={{width:"100%",padding:"13px",background:C.pale,color:C.violet,border:`1.5px dashed ${C.violet}50`,borderRadius:10,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:Fs,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
        + Add New Testimonial
      </button>
    </div>
  );
}

/* ─── APP ─── */
export default function App() {
  const w=useW(); const mob=w<900;
  const [loggedIn,setLoggedIn]=useState(false);
  const [section,setSection]=useState("overview");
  const [toast,setToast]=useState(null);
  const [overviewStats,setOverviewStats]=useState([]);

  const onToast=useCallback((msg,type="success")=>setToast({msg,type}),[]);
  const go=useCallback((s)=>{ setSection(s); window.scrollTo?.(0,0); },[]);

  // Load overview stats when logged in
  useEffect(()=>{
    if(!loggedIn) return;
    Promise.all([sb.get("products"),sb.get("testimonials"),sb.get("pricing")]).then(([prods,testi,pricing])=>{
      setOverviewStats([
        [prods.filter(p=>p.active).length,"Active Products","📦",C.violet],
        [prods.filter(p=>p.video_url).length,"Demo Videos","📹",C.blue],
        [testi.length,"Testimonials","⭐",C.amber],
        [pricing.length,"Pricing Plans","💰",C.green],
      ]);
    }).catch(()=>{});
  },[loggedIn]);

  if(!loggedIn) return <Login onLogin={()=>setLoggedIn(true)}/>;

  const Page=()=>{
    const props={onToast};
    if(section==="overview")    return <Overview go={go} stats={overviewStats}/>;
    if(section==="hero")        return <HeroSection {...props}/>;
    if(section==="products")    return <ProductsSection {...props}/>;
    if(section==="videos")      return <VideosSection {...props}/>;
    if(section==="pricing")     return <PricingSection {...props}/>;
    if(section==="contact")     return <ContactSection {...props}/>;
    if(section==="stats")       return <StatsSection {...props}/>;
    if(section==="testimonials")return <TestimonialsSection {...props}/>;
    return null;
  };

  if(!mob) return(
    <div style={{display:"flex",minHeight:"100vh",background:C.pale,fontFamily:Fs}}>
      <Sidebar active={section} go={go} onLogout={()=>setLoggedIn(false)}/>
      <div style={{flex:1,overflowY:"auto",padding:"28px 32px",maxHeight:"100vh"}}>
        <div style={{maxWidth:900,margin:"0 auto"}}><Page/></div>
      </div>
      {toast&&<Toast key={toast.msg} msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.pale,fontFamily:Fs,paddingBottom:72}}>
      <MobileHeader section={section} onLogout={()=>setLoggedIn(false)}/>
      <div style={{padding:"16px 14px",maxWidth:600,margin:"0 auto"}}><Page/></div>
      <BottomNav active={section} go={go}/>
      {toast&&<Toast key={toast.msg} msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
